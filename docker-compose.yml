services:
  nexa-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nexa-web
    restart: unless-stopped
    ports:
      - "3000:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
